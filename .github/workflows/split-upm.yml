name: Split UPM branch

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

jobs:
  split:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Split subtree to upm branch
        id: split
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          SHA=$(git subtree split --prefix=Packages/dev.tnayuki.unterm)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Push upm branch
        if: github.ref == 'refs/heads/main'
        run: git push origin ${{ steps.split.outputs.sha }}:refs/heads/upm --force-with-lease

      - name: Tag upm branch on version tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG=${GITHUB_REF##*/}
          git tag "upm/${TAG}" ${{ steps.split.outputs.sha }}
          git push origin "upm/${TAG}"
