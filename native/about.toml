# Config for `cargo about` — generates the third-party license notices bundled
# with the native plugin. We filter to the shipped targets (macOS + Windows) so
# the scan covers every crate that ends up in a distributed cdylib and drops
# build/dev-only and other-platform crates.
accepted = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "CC0-1.0",
    "Unicode-3.0",
    "Unlicense",
    "0BSD",
    "MPL-2.0",
]

# The shipped targets: macOS aarch64/x86_64 and Windows x86_64. This prunes
# Linux-only deps while still covering the Windows-only crates (windows, d3d12,
# gpu-allocator, hassle-rs, …) that go into unterm.dll.
targets = [
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "x86_64-pc-windows-msvc",
]
